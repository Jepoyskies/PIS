    <!-- ADD STUDENT MODAL -->
    <div class="modal fade" id="addStudentModal" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg">
          <div class="modal-header bg-xu-primary text-white py-3">
            <h6 class="modal-title fw-bold text-uppercase small letter-spacing-1">Register New Student</h6>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
          </div>
          <form method="POST">
            {% csrf_token %}
            <input type="hidden" name="add_student" value="1">
            <div class="modal-body p-4 bg-light">
                <div class="row mb-3">
                    <div class="col-7">
                        <label class="fw-bold small text-muted text-uppercase mb-1">ID Number</label>
                        <input type="text" name="student_number" class="form-control border-0 shadow-sm" required placeholder="e.g. 2024-0001">
                    </div>
                    <div class="col-5">
                        <label class="fw-bold small text-muted text-uppercase mb-1">Sex</label>
                        <select name="sex" class="form-select border-0 shadow-sm">
                            <option value="M">Male</option>
                            <option value="F">Female</option>
                        </select>
                    </div>
                </div>
                <div class="row mb-3">
                    <div class="col-6">
                        <label class="fw-bold small text-muted text-uppercase mb-1">First Name</label>
                        <input type="text" name="first_name" class="form-control border-0 shadow-sm" required>
                    </div>
                    <div class="col-6">
                        <label class="fw-bold small text-muted text-uppercase mb-1">Last Name</label>
                        <input type="text" name="last_name" class="form-control border-0 shadow-sm" required>
                    </div>
                </div>
                <div class="mb-0">
                    <label class="fw-bold small text-muted text-uppercase mb-1">Assigned Section</label>
                    <select name="section" class="form-select border-0 shadow-sm">
                        <option value="">-- Unassigned --</option>
                        {% for sec in sections %}
                        <option value="{{ sec.id }}">Grade {{ sec.grade_level }} - {{ sec.name }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div class="modal-footer bg-white py-2">
              <button type="button" class="btn btn-light btn-sm px-3" data-bs-dismiss="modal">Cancel</button>
              <button type="submit" class="btn btn-xu-primary btn-sm px-4 fw-bold">SAVE RECORD</button>
            </div>
          </form>
        </div>
      </div>
    </div>
