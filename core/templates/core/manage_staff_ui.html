{% extends 'core/maintenance_base.html' %}

{% block maintenance_content %}
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="m-0 text-danger fw-bold">Staff Account Management</h5>
    </div>
    <hr style="margin-top: 0;">

    <div class="row">
        <!-- List of Current Staff -->
        <div class="col-md-7">
            <div style="height: 400px; overflow-y: auto; border: 1px solid #999; background: white;">
                <table class="table table-sm table-bordered table-hover mb-0" style="font-size: 0.8rem;">
                    <thead style="position: sticky; top: 0; background-color: #e4e4e4;">
                        <tr><th>Username</th><th>Name</th><th>Role</th></tr>
                    </thead>
                    <tbody>
                        {% for staff in staff_list %}
                        <tr>
                            <td>{{ staff.username }}</td>
                            <td>{{ staff.first_name }} {{ staff.last_name }}</td>
                            <td><span class="badge bg-secondary">PIO Staff</span></td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Add Staff Form -->
        <div class="col-md-5">
            <div class="card p-3 shadow-sm border-dark" style="background-color: #e4e4e4;">
                <h6 class="fw-bold mb-3">Create New Staff Account</h6>
                <form method="POST">
                    {% csrf_token %}
                    <label class="small fw-bold">Username:</label>
                    <input type="text" name="username" class="form-control form-control-sm mb-2" required>
                    
                    <label class="small fw-bold">Employee ID:</label>
                    <input type="text" name="employee_id" class="form-control form-control-sm mb-2" required>
                    
                    <div class="row">
                        <div class="col-6">
                            <label class="small fw-bold">First Name:</label>
                            <input type="text" name="first_name" class="form-control form-control-sm mb-2">
                        </div>
                        <div class="col-6">
                            <label class="small fw-bold">Last Name:</label>
                            <input type="text" name="last_name" class="form-control form-control-sm mb-2">
                        </div>
                    </div>

                    <label class="small fw-bold">Password:</label>
                    <input type="password" name="password" class="form-control form-control-sm mb-3" required>

                    <button type="submit" class="btn btn-sm btn-primary w-100 fw-bold border-dark">Create Staff User</button>
                </form>
            </div>
        </div>
    </div>
{% endblock %}
