{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-width=1.0">
    <title>Logon - MS Access Clone</title>
    <link href="{% static 'core/css/bootstrap.min.css' %}" rel="stylesheet">
    <style>
        body {
            /* The classic faded pink/gray MS Access background color */
            background-color: #f8e8e8; 
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Tahoma', sans-serif;
            margin: 0;
        }

        .xp-modal {
            background-color: #d4d0c8;
            border: 2px solid #0055ea;
            width: 350px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
            border-top-left-radius: 5px;
            border-top-right-radius: 5px;
        }

        .xp-titlebar {
            background: linear-gradient(to right, #0058e6, #3a93ff);
            color: white;
            font-weight: bold;
            font-size: 13px;
            padding: 4px 8px;
            border-top-left-radius: 3px;
            border-top-right-radius: 3px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .xp-content {
            padding: 15px;
            display: flex;
            gap: 15px;
        }

        .xp-label {
            font-size: 12px;
            margin-bottom: 0;
            width: 70px;
        }

        .xp-input {
            height: 22px;
            border: 1px solid #7f9db9;
            font-size: 12px;
            padding: 2px 4px;
            width: 150px;
        }

        .xp-btn {
            width: 70px;
            height: 24px;
            font-size: 12px;
            background-color: #e3e3e3;
            border: 1px solid #003c74;
            border-radius: 3px;
            margin-bottom: 5px;
            cursor: pointer;
        }
        .xp-btn:active { background-color: #c0c0c0; }
    </style>
</head>
<body>

    <div class="xp-modal">
        <div class="xp-titlebar">
            <span>Logon</span>
            <span style="background-color: #e04343; border: 1px solid white; border-radius: 3px; padding: 0 4px; cursor: pointer;">X</span>
        </div>
        
        <form method="POST" class="xp-content">
            {% csrf_token %}
            <div>
                <div class="d-flex align-items-center mb-2">
                    <label class="xp-label">Name:</label>
                    <input type="text" name="username" class="xp-input" required autocomplete="off" autofocus>
                </div>
                <div class="d-flex align-items-center mb-2">
                    <label class="xp-label">Password:</label>
                    <input type="password" name="password" class="xp-input" required>
                </div>
                
                {% if messages %}
                    {% for message in messages %}
                        <div style="color: red; font-size: 11px; margin-top: 5px;">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            </div>

            <div class="d-flex flex-column">
                <button type="submit" class="xp-btn">OK</button>
                <button type="button" class="xp-btn" onclick="window.close()">Cancel</button>
            </div>
        </form>
    </div>

</body>
</html>
