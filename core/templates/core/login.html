{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logon - XU Prefect Information System</title>
    <link href="{% static 'core/css/bootstrap.min.css' %}" rel="stylesheet">
    <link href="{% static 'core/css/xu_styles.css' %}" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, var(--xu-blue-1) 0%, var(--xu-blue-2) 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            width: 400px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            overflow: hidden;
            border-bottom: 6px solid var(--xu-gold);
        }

        .login-header {
            background-color: white;
            padding: 30px 20px;
            text-align: center;
            border-bottom: 1px solid #eee;
        }

        .login-body {
            padding: 30px;
        }

        .form-control:focus {
            border-color: var(--xu-blue-2);
            box-shadow: 0 0 0 0.2rem rgba(58, 83, 164, 0.25);
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="login-header">
            <img src="{% static 'images/xu_logo.png' %}" alt="XU Logo" class="xu-logo-md mb-3">
            <h5 class="fw-bold mb-0" style="color: var(--xu-blue-1);">PREFECT INFORMATION SYSTEM</h5>
            <p class="text-muted small">Logon to access the system</p>
        </div>
        
        <form method="POST" class="login-body">
            {% csrf_token %} 
            <div class="mb-3">
                <label class="form-label small fw-bold text-uppercase" style="color: #666;">Username</label>
                <input type="text" name="username" class="form-control" required autocomplete="off" autofocus placeholder="Enter your name">
            </div>
            <div class="mb-4">
                <label class="form-label small fw-bold text-uppercase" style="color: #666;">Password</label>
                <input type="password" name="password" class="form-control" required placeholder="Enter your password">
            </div>
            
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-danger py-2 px-3 small mb-3">{{ message }}</div>
                {% endfor %}
            {% endif %}

            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-xu-primary py-2">OK</button>
                <button type="button" class="btn btn-light py-2 text-muted" onclick="window.close()">Cancel</button>
            </div>
        </form>
    </div>

</body>
</html>
